name: qrbox
description: "QRBox – A Secure QR Inventory System for managing physical storage boxes."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.7
  firebase_storage: ^12.4.4

  # Auth
  google_sign_in: ^6.2.2

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.3

  # Image
  image_picker: ^1.1.2

  # Utils
  crypto: ^3.0.6
  uuid: ^4.5.1
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  wakelock_plus: ^1.4.0
  flutter_local_notifications: ^21.0.0
  flutter_speed_dial: ^7.0.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
