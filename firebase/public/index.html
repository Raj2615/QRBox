<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="QRBox – Smart Inventory for Your Boxes. Scan a QR code to view box contents.">
  <title>QRBox – Smart Inventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>

<body>
  <div class="container">
    <div class="hero">
      <div class="logo-wrapper">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M3 11h8V3H3v8zm2-6h4v4H5V5zm8-2v8h8V3h-8zm6 6h-4V5h4v4zM3 21h8v-8H3v8zm2-6h4v4H5v-4zm13 2h2v4h-4v-2h2v-2zm-3-2h2v2h-2v-2zm-2 4h2v2h-2v-2zm2 2h2v2h-2v-2zm2-2h2v2h-2v-2zm2-4h2v4h-2v-4zm0-2h2v2h-2v-2zm-4 0h2v2h-2v-2z" />
        </svg>
      </div>
      <h1>QRBox</h1>
      <p class="tagline">Smart Inventory for Your Boxes</p>
    </div>

    <div class="card info-card">
      <div class="info-icon">📦</div>
      <p>Scan a QR code on any box to view its contents.<br>Each QR code links directly to a box's inventory page.</p>
    </div>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">📱</div>
        <h3>Scan QR</h3>
        <p>Use any phone camera</p>
      </div>
      <div class="feature">
        <div class="feature-icon">🔒</div>
        <h3>Enter PIN</h3>
        <p>Secure 4-digit access</p>
      </div>
      <div class="feature">
        <div class="feature-icon">📋</div>
        <h3>View Items</h3>
        <p>See what's inside</p>
      </div>
    </div>

    <div class="footer">
      <p>Powered by <strong>QRBox</strong></p>
    </div>
  </div>
</body>

</html>
